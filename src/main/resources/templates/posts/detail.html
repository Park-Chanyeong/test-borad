<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.title}">게시글 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-4" style="max-width: 860px;">
        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-1" th:text="${post.title}"></h5>
                <div class="d-flex gap-3 text-muted small">
                    <span><i class="bi bi-person me-1"></i><span th:text="${post.authorUsername ?: '익명'}"></span></span>
                    <span><i class="bi bi-calendar3 me-1"></i>
                        <span th:text="${post.createdAt != null ? #temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"></span>
                    </span>
                    <span><i class="bi bi-eye me-1"></i><span th:text="${post.viewCount}"></span></span>
                </div>
            </div>
            <div class="card-body py-4">
                <div style="white-space: pre-wrap; line-height: 1.9; min-height: 120px;"
                     th:text="${post.content}"></div>
            </div>
            <div class="card-footer bg-white d-flex gap-2">
                <a th:href="@{/web/posts}" class="btn btn-secondary btn-sm">
                    <i class="bi bi-list me-1"></i>목록
                </a>
                <div sec:authorize="isAuthenticated()">
                    <div th:if="${post.authorUsername != null and post.authorUsername == #authentication.name}">
                        <a th:href="@{/web/posts/{id}/edit(id=${post.id})}" class="btn btn-primary btn-sm">
                            <i class="bi bi-pencil me-1"></i>수정
                        </a>
                        <form th:action="@{/web/posts/{id}/delete(id=${post.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('삭제하시겠습니까?')">
                            <button type="submit" class="btn btn-danger btn-sm">
                                <i class="bi bi-trash me-1"></i>삭제
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
