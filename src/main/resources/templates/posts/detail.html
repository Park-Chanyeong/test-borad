<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${post.title}">게시글 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-4" style="max-width: 860px;">

        <!-- 게시글 본문 -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white py-3">
                <h5 class="mb-1" th:text="${post.title}"></h5>
                <div class="d-flex gap-3 text-muted small">
                    <span><i class="bi bi-person me-1"></i><span th:text="${post.authorUsername ?: '익명'}"></span></span>
                    <span><i class="bi bi-calendar3 me-1"></i>
                        <span th:text="${post.createdAt != null ? #temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"></span>
                    </span>
                    <span><i class="bi bi-eye me-1"></i><span th:text="${post.viewCount}"></span></span>
                </div>
            </div>
            <div class="card-body py-4">
                <div style="white-space: pre-wrap; line-height: 1.9; min-height: 120px;"
                     th:text="${post.content}"></div>
            </div>
            <div class="card-footer bg-white">
                <!-- 좋아요 버튼 -->
                <div class="d-flex align-items-center gap-3">
                    <form th:action="@{/web/posts/{id}/like(id=${post.id})}" method="post" class="d-inline"
                          sec:authorize="isAuthenticated()">
                        <button type="submit"
                                th:classappend="${hasLiked} ? 'btn-danger' : 'btn-outline-danger'"
                                class="btn btn-sm">
                            <i class="bi bi-heart-fill me-1"></i>
                            <span th:text="${likeCount}">0</span>
                        </button>
                    </form>
                    <span class="text-muted small" sec:authorize="!isAuthenticated()">
                        <i class="bi bi-heart me-1"></i><span th:text="${likeCount}">0</span>
                        <span class="ms-1">(로그인 후 좋아요 가능)</span>
                    </span>

                    <!-- 수정/삭제 (본인만) -->
                    <div class="ms-auto d-flex gap-2">
                        <a th:href="@{/web/posts}" class="btn btn-secondary btn-sm">
                            <i class="bi bi-list me-1"></i>목록
                        </a>
                        <div sec:authorize="isAuthenticated()">
                            <div th:if="${post.authorUsername != null and post.authorUsername == #authentication.name}"
                                 class="d-flex gap-2">
                                <a th:href="@{/web/posts/{id}/edit(id=${post.id})}" class="btn btn-primary btn-sm">
                                    <i class="bi bi-pencil me-1"></i>수정
                                </a>
                                <form th:action="@{/web/posts/{id}/delete(id=${post.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('삭제하시겠습니까?')">
                                    <button type="submit" class="btn btn-danger btn-sm">
                                        <i class="bi bi-trash me-1"></i>삭제
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 댓글 섹션 -->
        <div id="comments">
            <h6 class="mb-3">
                <i class="bi bi-chat-dots me-1"></i>댓글
                <span class="badge bg-secondary ms-1" th:text="${#lists.size(comments)}">0</span>
            </h6>

            <!-- 댓글 목록 -->
            <div th:if="${#lists.isEmpty(comments)}" class="text-muted small mb-3">첫 번째 댓글을 남겨보세요.</div>

            <div th:each="comment : ${comments}" class="card mb-2 border-0 bg-light">
                <div class="card-body py-2 px-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <span class="fw-semibold small me-2" th:text="${comment.authorUsername ?: '익명'}"></span>
                            <span class="text-muted small"
                                  th:text="${comment.createdAt != null ? #temporals.format(comment.createdAt, 'MM-dd HH:mm') : ''}"></span>
                        </div>
                        <div sec:authorize="isAuthenticated()">
                            <form th:if="${comment.authorUsername != null and comment.authorUsername == #authentication.name}"
                                  th:action="@{/web/posts/{id}/comments/{cid}/delete(id=${post.id}, cid=${comment.id})}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('댓글을 삭제하시겠습니까?')">
                                <button type="submit" class="btn btn-link btn-sm text-danger p-0">
                                    <i class="bi bi-x-lg"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                    <div class="mt-1 small" style="white-space: pre-wrap;" th:text="${comment.content}"></div>
                </div>
            </div>

            <!-- 댓글 작성 폼 (로그인 시) -->
            <div class="mt-3" sec:authorize="isAuthenticated()">
                <form th:action="@{/web/posts/{id}/comments(id=${post.id})}" method="post"
                      th:object="${commentDto}">
                    <div class="input-group">
                        <textarea class="form-control" th:field="*{content}" rows="2"
                                  placeholder="댓글을 입력하세요" required></textarea>
                        <button type="submit" class="btn btn-primary px-3">등록</button>
                    </div>
                </form>
            </div>
            <div class="mt-3 text-muted small" sec:authorize="!isAuthenticated()">
                <a th:href="@{/web/login}">로그인</a> 후 댓글을 작성할 수 있습니다.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
