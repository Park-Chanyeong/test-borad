<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-4" style="max-width: 720px;">
        <h5 class="mb-4">글 수정</h5>
        <form th:action="@{/web/posts/{id}/edit(id=${post.id})}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">제목</label>
                <input type="text" class="form-control" name="title" th:value="${post.title}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">내용</label>
                <textarea class="form-control" name="content" rows="14"
                          required th:text="${post.content}"></textarea>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/web/posts/{id}(id=${post.id})}" class="btn btn-secondary">취소</a>
                <button type="submit" class="btn btn-primary">저장</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
