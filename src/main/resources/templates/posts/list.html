<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">
                전체 게시글
                <span class="badge bg-secondary ms-1" th:text="${posts.totalElements}">0</span>
            </h5>
            <a th:href="@{/web/posts/new}" class="btn btn-primary btn-sm" sec:authorize="isAuthenticated()">
                <i class="bi bi-pencil-square me-1"></i>글 작성
            </a>
        </div>

        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th class="text-center" style="width:70px">번호</th>
                    <th>제목</th>
                    <th class="text-center" style="width:110px">작성자</th>
                    <th class="text-center" style="width:150px">날짜</th>
                    <th class="text-center" style="width:70px">조회</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${posts.totalElements == 0}">
                    <td colspan="5" class="text-center text-muted py-5">등록된 게시글이 없습니다.</td>
                </tr>
                <tr th:each="post, stat : ${posts.content}">
                    <td class="text-center text-muted small"
                        th:text="${posts.totalElements - (posts.number * posts.size) - stat.index}"></td>
                    <td>
                        <a th:href="@{/web/posts/{id}(id=${post.id})}"
                           th:text="${post.title}"
                           class="text-decoration-none fw-medium text-dark"></a>
                    </td>
                    <td class="text-center text-muted small" th:text="${post.authorUsername ?: '익명'}"></td>
                    <td class="text-center text-muted small"
                        th:text="${post.createdAt != null ? #temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                    <td class="text-center text-muted small" th:text="${post.viewCount}"></td>
                </tr>
            </tbody>
        </table>

        <nav th:if="${posts.totalPages > 1}" aria-label="페이지 네비게이션">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${posts.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/web/posts(page=${posts.number - 1}, size=${posts.size})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}"
                    th:classappend="${i == posts.number} ? 'active'">
                    <a class="page-link"
                       th:href="@{/web/posts(page=${i}, size=${posts.size})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${posts.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/web/posts(page=${posts.number + 1}, size=${posts.size})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
