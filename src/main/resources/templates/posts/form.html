<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>글 작성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-4" style="max-width: 720px;">
        <h5 class="mb-4">글 작성</h5>
        <form th:action="@{/web/posts}" method="post" th:object="${dto}">
            <div class="mb-3">
                <label class="form-label fw-semibold">제목</label>
                <input type="text" class="form-control" th:field="*{title}" placeholder="제목을 입력하세요" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">내용</label>
                <textarea class="form-control" th:field="*{content}" rows="14"
                          placeholder="내용을 입력하세요" required></textarea>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/web/posts}" class="btn btn-secondary">취소</a>
                <button type="submit" class="btn btn-primary">등록</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
