<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card shadow-sm" style="width: 400px;">
            <div class="card-body p-4">
                <h5 class="text-center mb-4 fw-bold">회원가입</h5>

                <div class="alert alert-danger py-2" th:if="${error}" th:text="${error}"></div>

                <form th:action="@{/web/register}" method="post">
                    <div class="mb-3">
                        <label class="form-label">아이디</label>
                        <input type="text" name="username" class="form-control" required autofocus
                               th:value="${dto?.username}"
                               placeholder="아이디를 입력하세요">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">비밀번호</label>
                        <input type="password" name="password" class="form-control" required
                               placeholder="비밀번호를 입력하세요">
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary">가입하기</button>
                    </div>
                </form>
                <div class="text-center small">
                    이미 계정이 있으신가요?
                    <a th:href="@{/web/login}" class="text-decoration-none">로그인</a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
